# V2 - Recruiting Engine Registry
# Single source of truth for nodes, master docs, folder IDs, and protection rules.
# V1 (V1 - Novacode Recruiting, server.py) is still the active demo runtime;
# V2 delegates via Strangler-Fig until each node is natively reimplemented.

automation:
  name: recruiting
  display_name: V2 - Recruiting Engine
  version: 2.0
  status: parallel-with-v1
  domain: recruiting-marketing-agencies
  legacy_version:
    name: V1 - Novacode Recruiting
    location: demo-backend/server.py
    endpoint: /api/execute-node
    status: active-demo-runtime

